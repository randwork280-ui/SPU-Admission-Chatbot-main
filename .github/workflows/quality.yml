name: Quality Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Services/Data_Loader/requirements.txt

      - name: Run quality gate
        run: python scripts/quality_check.py

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Services/spu-ai-connect-main

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Services/spu-ai-connect-main/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
